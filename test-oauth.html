<!DOCTYPE html>
<html>
<head>
    <title>OAuth URL Test</title>
</head>
<body>
    <h1>Test OAuth URL Generation</h1>
    <button onclick="testOAuth()">Generate OAuth URL</button>
    <div id="result"></div>
    
    <h2>Expected Google Cloud Console Settings:</h2>
    <p><strong>Authorized redirect URIs:</strong></p>
    <code>https://csbwewirwzeitavhvykr.supabase.co/auth/v1/callback</code>
    
    <p><strong>Authorized JavaScript origins:</strong></p>
    <code>https://csbwewirwzeitavhvykr.supabase.co</code><br>
    <code>http://localhost:3000</code>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://csbwewirwzeitavhvykr.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzYndld2lyd3plaXRhdmh2eWtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MjUyMjc3NzMsImV4cCI6MjA0MDgwMzc3M30.RHyREdQHdqw8_8ZT4ovPTbePVsj4_SSpLpQJlMz-0Ug';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function testOAuth() {
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/profile'
                    }
                });
                
                document.getElementById('result').innerHTML = `
                    <h3>Result:</h3>
                    <p><strong>Success:</strong> ${!error}</p>
                    <p><strong>URL Generated:</strong> ${data?.url || 'None'}</p>
                    <p><strong>Error:</strong> ${error?.message || 'None'}</p>
                    ${data?.url ? `<p><a href="${data.url}" target="_blank">Test OAuth URL</a></p>` : ''}
                `;
                
                console.log('OAuth test result:', { data, error });
            } catch (err) {
                document.getElementById('result').innerHTML = `<p><strong>Error:</strong> ${err.message}</p>`;
                console.error('OAuth test error:', err);
            }
        }
    </script>
</body>
</html>
